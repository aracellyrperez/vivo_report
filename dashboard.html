<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard en vivo — VIVO</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js" defer></script>
<style>
:root { --bg: #f4f6ff; --bg2: #eaeefc; --surface: #ffffff; --border: #d4daff; --ink: #0d1540; --ink2: #2d3a6e; --muted: #7a85b8; --accent: #1e46e6; --accent2: #4d6ef0; --good: #1a6b3a; --good-bg: #e8f5ed; --warn: #b87800; --warn-bg: #fef3d0; --bad: #b3261e; --bad-bg: #fdeceb; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font-family: 'Exo 2', sans-serif; min-height: 100vh; padding: 0 0 60px; }
.topbar { background: #000; color: #fff; padding: 10px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-brand { font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #33d17a; }
.dot.off { background: #d13333; }
.btn-refresh { background: rgba(30,70,230,.25); border: 1px solid rgba(77,110,240,.6); color: #fff; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
.hero { background: #000; color: #fff; padding: 30px 40px 34px; }
.main { max-width: 1180px; margin: 0 auto; padding: 26px 24px 0; }
.filters { display:flex; flex-direction:column; gap:14px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 22px; margin-bottom:24px; }
.filters-row { display:flex; flex-wrap:wrap; gap:14px; }
.field { display:flex; flex-direction:column; gap:6px; min-width:150px; }
.field label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; }
.field select, .field input { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; font-family:'Exo 2',sans-serif; }
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:26px; }
.kpi { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
.kpi .val { font-size:24px; font-weight:800; }
.kpi .lbl { font-size:10px; color:var(--muted); text-transform:uppercase; }
.table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
table.sup-table { width:100%; border-collapse:collapse; font-size:13px; }
table.sup-table th { padding:10px 16px; background:var(--bg2); color:var(--muted); text-align:left; font-size:10px; text-transform:uppercase; }
table.sup-table td { padding:8px 16px; border-bottom:1px solid var(--border); }
.cell-pos { background:var(--good-bg); color:var(--good); font-weight:700; }
.cell-zero { background:var(--bad-bg); color:var(--bad); font-weight:700; }
#dashboard-content { display:none; }
#dashboard-content.show { display:block; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><div class="dot" id="live-dot"></div> VIVO — Dashboard en vivo</div>
  <button class="btn-refresh" id="btn-refresh" onclick="cargarTodo()">Actualizar</button>
</div>

<div class="hero">
  <h1>Ventas cargadas <span>hoy</span></h1>
</div>

<div class="main">
  <div class="filters">
    <div class="filters-row">
      <div class="field"><label>Fecha</label><input type="date" id="f-fecha"></div>
      <div class="field"><label>Corte</label><select id="f-corte"><option value="">Todos</option></select></div>
      <div class="field"><label>POS</label><select id="f-pos"><option value="">Todos</option></select></div>
    </div>
  </div>

  <div id="dashboard-content">
    <div class="kpi-row">
      <div class="kpi"><div class="val" id="kpi-so">0</div><div class="lbl">Total SO</div></div>
      <div class="kpi"><div class="val" id="kpi-pos">0</div><div class="lbl">POS con venta</div></div>
    </div>
    <div class="table-wrap">
      <table class="sup-table">
        <thead><tr><th>POS</th><th>SO</th><th>Stock</th></tr></thead>
        <tbody id="sup-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1JiB9SMNwMzbWmD2bU8Wax47su0vtfKNKDrxI6VeCXM0';
let ventasRaw = [], tgMonthRows = [];

async function fetchGviz(sheetName) {
  return new Promise((resolve) => {
    const cbName = `cb${Math.floor(Math.random()*100000)}`;
    window[cbName] = (json) => resolve(json.table);
    const script = document.createElement('script');
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cbName}&sheet=${encodeURIComponent(sheetName)}`;
    document.head.appendChild(script);
  });
}

function normalize(s) { return String(s||'').trim().toLowerCase(); }

async function cargarTodo() {
  const [tVentas, tTg] = await Promise.all([fetchGviz('Hoja 1'), fetchGviz('tg_month')]);
  
  // Normalizar ventas
  ventasRaw = tVentas.rows.map(r => ({
    fecha: String(r.c[0]?.v||'').slice(0,10),
    pos: String(r.c[4]?.v||''),
    so: parseFloat(r.c[8]?.v)||0,
    stock: parseFloat(r.c[9]?.v)||0
  }));

  // Normalizar base POS (tg_month)
  tgMonthRows = tTg.rows.map(r => String(r.c[2]?.v||'')); // Asumiendo que el POS está en la col 3

  poblarFiltros();
  render();
  document.getElementById('dashboard-content').classList.add('show');
}

function poblarFiltros() {
  const selPos = document.getElementById('f-pos');
  selPos.innerHTML = '<option value="">Todos</option>' + [...new Set(tgMonthRows)].sort().map(p => `<option value="${p}">${p}</option>`).join('');
}

function render() {
  const posFiltro = document.getElementById('f-pos').value;
  const fechaFiltro = document.getElementById('f-fecha').value;
  
  // Unir universo: todos los POS de tg_month
  const posUniverso = posFiltro ? [posFiltro] : [...new Set(tgMonthRows)];
  
  const tbody = document.getElementById('sup-tbody');
  tbody.innerHTML = '';
  let totalSo = 0;
  let posConVenta = 0;

  posUniverso.forEach(pos => {
    const ventasPos = ventasRaw.filter(v => v.pos === pos && (!fechaFiltro || v.fecha === fechaFiltro));
    const so = ventasPos.reduce((sum, v) => sum + v.so, 0);
    const stock = ventasPos.reduce((sum, v) => sum + v.stock, 0);
    
    if (so > 0) posConVenta++;
    totalSo += so;

    tbody.innerHTML += `<tr>
      <td>${pos}</td>
      <td class="${so>0?'cell-pos':'cell-zero'}">${so}</td>
      <td class="${stock>0?'cell-pos':'cell-zero'}">${stock}</td>
    </tr>`;
  });

  document.getElementById('kpi-so').textContent = totalSo;
  document.getElementById('kpi-pos').textContent = posConVenta;
}

document.getElementById('f-pos').addEventListener('change', render);
document.getElementById('f-fecha').addEventListener('change', render);
document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];

cargarTodo();
</script>
</body>
</html>
